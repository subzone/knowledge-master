services:
  falkordb:
    image: falkordb/falkordb:v4.4.1
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - falkor_data:/data
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  falkor_data:
