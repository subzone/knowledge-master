services:
  falkordb:
    image: falkordb/falkordb:v4.4.1
    ports:
      - "6379:6379"
    volumes:
      - falkor_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  postgres:
    image: postgres:16.8-alpine
    environment:
      POSTGRES_DB: knowledge_master
      POSTGRES_USER: km
      POSTGRES_PASSWORD: ${KM_PG_PASSWORD:-km_local_dev}
    ports:
      - "5433:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U km"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  falkor_data:
  pg_data:
