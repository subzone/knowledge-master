name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint
        run: ruff check knowledge_master/

      - name: Security (SAST)
        run: pip install bandit && bandit -r knowledge_master/ -s B404,B603 -ll  # fail only on medium+ severity

      - name: Security (SCA)
        run: pip install pip-audit && pip-audit || true  # report only, don't block on transient dep CVEs

      - name: Test (unit)
        run: pytest tests/ -v --ignore=tests/integration

  integration:
    runs-on: ubuntu-latest
    needs: test

    services:
      falkordb:
        image: falkordb/falkordb:v4.4.1
        ports:
          - 6379:6379
        options: --health-cmd "redis-cli ping" --health-interval 5s --health-timeout 3s --health-retries 5

    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Ollama
        run: |
          curl -fsSL https://ollama.com/install.sh | sh
          ollama serve &
          sleep 5

      - name: Pull embedding model
        run: ollama pull nomic-embed-text

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Integration tests
        run: pytest tests/integration/ -v
